<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusUI - Redirecting to Demo</title>
    <!-- TODO: Replace this redirect page with main site content when ready -->
    <!-- Meta refresh disabled to allow JavaScript countdown -->
    <!-- <meta http-equiv="refresh" content="3; url=/demo/"> -->
    <link rel="canonical" href="/demo/">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .redirect-container {
            max-width: 400px;
            padding: 2rem;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .message {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }
        .manual-link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .manual-link:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="logo">FocusUI</div>
        <div class="message">Redirecting to demo in <span id="countdown">3</span> seconds...</div>
        <a href="/demo/" class="manual-link">Go to Demo Now</a>
    </div>
    
    <script>
        // Start countdown immediately when script loads
        (function() {
            let count = 3;
            
            function updateCountdown() {
                const countdownElement = document.getElementById('countdown');
                if (countdownElement) {
                    countdownElement.textContent = count;
                }
            }
            
            // Update countdown every second
            const timer = setInterval(() => {
                count--;
                updateCountdown();
                
                if (count < 0) {
                    clearInterval(timer);
                    // Redirect to demo
                    window.location.href = '/demo/';
                }
            }, 1000);
            
            // Ensure DOM is ready for initial update
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', updateCountdown);
            } else {
                updateCountdown();
            }
        })();
    </script>
</body>
</html>
