<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusUI - Prototype</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Center Area (background) -->
        <div class="center-area"></div>
        
        <!-- Top Drawer -->
        <div class="drawer drawer-top" id="drawer-top">
            <div class="drawer-handle"></div>
        </div>
        
        <!-- Left Drawer -->
        <div class="drawer drawer-left" id="drawer-left">
            <div class="drawer-handle"></div>
            <div class="drawer-content">
                <div class="icon social-icon"><i class="fab fa-x-twitter"></i></div>
                <div class="icon social-icon"><i class="fab fa-linkedin"></i></div>
                <div class="icon social-icon"><i class="fab fa-facebook"></i></div>
                <div class="icon social-icon bluesky-text">bsky</div>
                <div class="icon social-icon"><i class="fab fa-mastodon"></i></div>
                <div class="icon social-icon"><i class="fab fa-whatsapp"></i></div>
            </div>
        </div>
        
        <!-- Right Drawer -->
        <div class="drawer drawer-right" id="drawer-right">
            <div class="drawer-handle"></div>
        </div>
        
        <!-- Bottom Drawer -->
        <div class="drawer drawer-bottom" id="drawer-bottom">
            <div class="drawer-handle"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
