[build]
  # No build command needed for static site
  publish = "."
  # GitHub integration settings
  command = ""

[build.environment]
  # Environment variables if needed later
  NODE_VERSION = "18"

[context.production]
  publish = "."

[context.deploy-preview]
  publish = "."

[[redirects]]
  # Temporary redirect root to demo (will be removed when main site is ready)
  from = "/"
  to = "/demo/"
  status = 302
  force = false
  # TODO: Remove this redirect when main site content is added

[[redirects]]
  # Handle SPA routing for demo
  from = "/demo/*"
  to = "/demo/index.html"
  status = 200

[[redirects]]
  # Ensure README.md is not served on the website (GitHub only)
  from = "/README.md"
  to = "/404.html"
  status = 404

[[headers]]
  # Security headers
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data:; script-src 'self'"

[[headers]]
  # Cache static assets - reduced cache time for development
  for = "/demo/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"  # 1 hour instead of 1 year

[[headers]]
  for = "/demo/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"  # 1 hour instead of 1 year

[[headers]]
  for = "/demo/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
